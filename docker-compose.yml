services:
  postgres:
    image: postgres:16
    container_name: hazina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hazina}
    ports:
      - "5432:5432"
    volumes:
      - hazina_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hazina}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hazina-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BACKEND_TARGET:-development}
    container_name: hazina-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hazina}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      # Mount source for hot-reload in development (ignored in production)
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hazina-net

networks:
  hazina-net:
    driver: bridge

volumes:
  hazina_pg_data:
